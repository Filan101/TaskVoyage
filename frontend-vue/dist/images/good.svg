<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <!-- 背景 -->
  <rect width="400" height="300" fill="#f5f5f5"/>
  <!-- 图标 -->
  <g transform="translate(200, 150)">
    <!-- 箭头 -->
    <path d="M-60 0 L60 0 M40 -20 L60 0 L40 20" stroke="#28a745" stroke-width="10" fill="none"/>
    <!-- 圆圈 -->
    <circle cx="0" cy="0" r="80" fill="#e9ecef"/>
    <circle cx="0" cy="0" r="75" fill="white" stroke="#dee2e6" stroke-width="3"/>
    <!-- 对勾 -->
    <path d="M-30 0 L-10 20 L40 -30" stroke="#28a745" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- 文字 -->
  <text x="200" y="280" font-family="Arial" font-size="14" fill="#6c757d" text-anchor="middle">TaskVoyage</text>
</svg>